<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CATAI Sprite Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a2e;
  font-family: monospace;
  color: #eee;
  padding: 20px;
}
h1 {
  font-size: 20px;
  color: #ffcc44;
  margin-bottom: 4px;
  letter-spacing: 2px;
}
.subtitle { color: #888; font-size: 12px; margin-bottom: 16px; }
.controls {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
  font-size: 12px;
  color: #aaa;
  flex-wrap: wrap;
}
.char-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.char-btn {
  background: #2a2a3e;
  border: 1px solid #444;
  color: #ccc;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: monospace;
  font-size: 11px;
}
.char-btn.active {
  background: #3a3a1e;
  border-color: #ffcc44;
  color: #ffcc44;
}
.char-btn:hover { border-color: #888; }
input[type=range] { accent-color: #ffcc44; }
.section-title {
  font-size: 13px;
  color: #ffaa22;
  letter-spacing: 1px;
  margin: 28px 0 12px;
  border-bottom: 1px solid #333;
  padding-bottom: 6px;
}
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}
.cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.cell:hover canvas { outline: 2px solid #ffcc44; }
canvas {
  background: repeating-conic-gradient(#2a2a3a 0% 25%, #1e1e2e 0% 50%)
              0 0 / 16px 16px;
  image-rendering: pixelated;
  border-radius: 4px;
}
.label {
  font-size: 10px;
  color: #aaa;
  text-align: center;
  max-width: 140px;
}
.dir-badge {
  font-size: 9px;
  background: #333;
  color: #ffaa44;
  padding: 1px 5px;
  border-radius: 3px;
}
.fps-control {
  display: flex;
  align-items: center;
  gap: 10px;
}
</style>
</head>
<body>

<h1>:: CATAI SPRITE VIEWER ::</h1>
<p class="subtitle">Clic sur une animation pour la mettre en pause · <kbd>F</kbd> pour tout figer</p>

<div class="controls">
  <div class="char-selector" id="char-selector"></div>
  <div class="fps-control">
    <label>FPS: <span id="fps-val">8</span></label>
    <input type="range" id="fps-range" min="1" max="24" value="8">
  </div>
</div>

<div id="root"></div>

<script>
const CHARACTERS = [
  { id: 'cat_orange',    label: '🟠 cat orange',    dir: 'catai_linux/cat_orange',    size: 80 },
  { id: 'cat01',         label: '🟤 cat tabby',     dir: 'catai_linux/cat01',         size: 80 },
  { id: 'cat02',         label: '⬛ cat dark',       dir: 'catai_linux/cat02',         size: 80 },
  { id: 'cat03',         label: '🟫 cat brown',     dir: 'catai_linux/cat03',         size: 80 },
  { id: 'cat04',         label: '🩶 cat grey',      dir: 'catai_linux/cat04',         size: 80 },
  { id: 'cat05',         label: '🖤 cat black',     dir: 'catai_linux/cat05',         size: 80 },
  { id: 'kitten_orange', label: '🟠 kitten orange', dir: 'catai_linux/kitten_orange', size: 64 },
  { id: 'kitten01',      label: '🟤 kitten tabby',  dir: 'catai_linux/kitten01',      size: 64 },
  { id: 'kitten02',      label: '⬛ kitten dark',    dir: 'catai_linux/kitten02',      size: 64 },
  { id: 'kitten03',      label: '🟫 kitten brown',  dir: 'catai_linux/kitten03',      size: 64 },
  { id: 'kitten04',      label: '🩶 kitten grey',   dir: 'catai_linux/kitten04',      size: 64 },
  { id: 'kitten05',      label: '🖤 kitten black',  dir: 'catai_linux/kitten05',      size: 64 },
];

// Animations for the orange cat (original)
const ANIMS_ORANGE = [
  { name:'running-8-frames', dir:'east',   frames:8,  label:'Running (east)' },
  { name:'running-8-frames', dir:'south',  frames:8,  label:'Running (south)' },
  { name:'eating',           dir:'south',  frames:11, label:'Eating' },
  { name:'drinking',         dir:'south',  frames:8,  label:'Drinking' },
  { name:'angry',            dir:'south',  frames:9,  label:'Angry' },
  { name:'waking-getting-up',dir:'south',  frames:9,  label:'Waking up' },
  { name:'sleeping-ball',    dir:'south',  frames:4,  label:'Sleeping ball' },
  { name:'chasing-mouse',    dir:'east',   frames:6,  label:'Chasing mouse' },
  { name:'playing-ball',     dir:'south',  frames:8,  label:'Playing ball' },
  { name:'butterfly',        dir:'south',  frames:8,  label:'Butterfly' },
  { name:'scratching-tree',  dir:'east',   frames:6,  label:'Scratching tree' },
  { name:'peeing',           dir:'east',   frames:6,  label:'Peeing' },
  { name:'pooping',          dir:'south',  frames:6,  label:'Pooping' },
];

// Animations for catset/kitten characters. Frame counts are MAX across both —
// missing frames return null and are filtered out by buildCell, so the same
// list works for cats (23 anims) and kittens (17 anims, missing sleep/fright/ledge*).
const ANIMS_CATSET = [
  { name:'running-8-frames', dir:'east',   frames:4,  label:'Running (east)' },
  { name:'running-8-frames', dir:'west',   frames:4,  label:'Running (west)' },
  { name:'sleeping-ball',    dir:'south',  frames:8,  label:'Sleeping (cats only)' },
  { name:'flat',             dir:'south',  frames:8,  label:'Flat / Sit' },
  { name:'angry',            dir:'south',  frames:7,  label:'Angry' },
  { name:'chasing-mouse',    dir:'east',   frames:8,  label:'Chasing (east)' },
  { name:'chasing-mouse',    dir:'west',   frames:8,  label:'Chasing (west)' },
  { name:'surprised',        dir:'east',   frames:8,  label:'Surprised (cats only)' },
  { name:'eating',           dir:'south',  frames:8,  label:'Eating (crouch)' },
  { name:'love',             dir:'south',  frames:8,  label:'Love / Loaf' },
  { name:'grooming',         dir:'south',  frames:8,  label:'Grooming' },
  { name:'rolling',          dir:'south',  frames:8,  label:'Rolling' },
  { name:'waking-getting-up',dir:'south',  frames:8,  label:'Walk / Waking' },
  { name:'jumping',          dir:'south',  frames:5,  label:'Jumping' },
  { name:'climbing',         dir:'east',   frames:11, label:'Climbing (east, cats only)' },
  { name:'climbing',         dir:'west',   frames:11, label:'Climbing (west, cats only)' },
  { name:'dash',                dir:'east',   frames:10, label:'Dash (east)' },
  { name:'dash',                dir:'west',   frames:10, label:'Dash (west)' },
  { name:'die',                 dir:'south',  frames:8,  label:'Die' },
  { name:'fall',                dir:'south',  frames:5,  label:'Fall' },
  { name:'hurt',                dir:'south',  frames:5,  label:'Hurt' },
  { name:'land',                dir:'south',  frames:3,  label:'Land' },
  { name:'ledgeclimb-struggle', dir:'east',   frames:12, label:'Ledge Struggle (east, cats only)' },
  { name:'ledgeclimb-struggle', dir:'west',   frames:12, label:'Ledge Struggle (west, cats only)' },
  { name:'ledgegrab',           dir:'east',   frames:5,  label:'Ledge Grab (east, cats only)' },
  { name:'ledgegrab',           dir:'west',   frames:5,  label:'Ledge Grab (west, cats only)' },
  { name:'ledgeidle',           dir:'east',   frames:8,  label:'Ledge Idle (east, cats only)' },
  { name:'ledgeidle',           dir:'west',   frames:8,  label:'Ledge Idle (west, cats only)' },
  { name:'wallclimb',           dir:'east',   frames:8,  label:'Wall Climb (east)' },
  { name:'wallclimb',           dir:'west',   frames:8,  label:'Wall Climb (west)' },
  { name:'wallgrab',            dir:'east',   frames:8,  label:'Wall Grab (east)' },
  { name:'wallgrab',            dir:'west',   frames:8,  label:'Wall Grab (west)' },
];

let currentChar = CHARACTERS[0];
let fps = 8;
let globalPaused = false;
const pausedCells = new Set();
const timers = [];

document.getElementById('fps-range').addEventListener('input', e => {
  fps = +e.target.value;
  document.getElementById('fps-val').textContent = fps;
  timers.forEach(t => { clearInterval(t.id); t.id = setInterval(t.fn, 1000/fps); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    globalPaused = !globalPaused;
    document.querySelector('.subtitle').textContent =
      globalPaused ? '⏸ Tout figé — appuie sur F pour reprendre'
                   : 'Clic sur une animation pour la mettre en pause · F pour tout figer';
  }
});

function framePath(charDir, anim, dir, i) {
  return `${charDir}/animations/${anim}/${dir}/frame_${String(i).padStart(3,'0')}.png`;
}

async function buildCell(char, anim) {
  const { name, dir, frames: nframes, label } = anim;
  const cell = document.createElement('div');
  cell.className = 'cell';

  const sz = char.size;
  const SCALE = 3;  // Fixed: cats 80*3=240px, kittens 64*3=192px (proportionally smaller)
  const canvas = document.createElement('canvas');
  canvas.width = sz * SCALE;
  canvas.height = sz * SCALE;
  canvas.style.width = (sz * SCALE) + 'px';
  canvas.style.height = (sz * SCALE) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const labelDiv = document.createElement('div');
  labelDiv.className = 'label';
  const dirBadge = document.createElement('span');
  dirBadge.className = 'dir-badge';
  dirBadge.textContent = dir;
  labelDiv.textContent = label + ' ';
  labelDiv.appendChild(dirBadge);

  const images = [];
  for (let i = 0; i < nframes; i++) {
    const img = new Image();
    img.src = framePath(char.dir, name, dir, i);
    images.push(new Promise(res => { img.onload = () => res(img); img.onerror = () => res(null); }));
  }
  const loaded = await Promise.all(images);
  const valid = loaded.filter(Boolean);
  if (!valid.length) return null;

  let fi = 0;
  function draw() {
    if (globalPaused || pausedCells.has(cell)) return;
    const img = valid[fi % valid.length];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, sz * SCALE, sz * SCALE);
    fi++;
  }

  draw();
  const t = { fn: draw, id: setInterval(draw, 1000/fps) };
  timers.push(t);
  canvas.addEventListener('click', () => {
    if (pausedCells.has(cell)) pausedCells.delete(cell);
    else pausedCells.add(cell);
  });

  cell.appendChild(canvas);
  cell.appendChild(labelDiv);
  return cell;
}

async function renderChar(char) {
  timers.forEach(t => clearInterval(t.id));
  timers.length = 0;
  pausedCells.clear();

  const root = document.getElementById('root');
  root.innerHTML = '';

  const anims = ANIMS_CATSET;

  const h = document.createElement('div');
  h.className = 'section-title';
  h.textContent = `Animations — ${char.label}`;
  root.appendChild(h);

  const grid = document.createElement('div');
  grid.className = 'grid';
  root.appendChild(grid);

  for (const anim of anims) {
    const cell = await buildCell(char, anim);
    if (cell) grid.appendChild(cell);
  }
}

// Build character selector buttons
const sel = document.getElementById('char-selector');
CHARACTERS.forEach(char => {
  const btn = document.createElement('button');
  btn.className = 'char-btn' + (char === currentChar ? ' active' : '');
  btn.textContent = char.label;
  btn.addEventListener('click', () => {
    currentChar = char;
    sel.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderChar(char);
  });
  sel.appendChild(btn);
});

renderChar(currentChar);
</script>
</body>
</html>
