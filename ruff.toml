line-length = 140
target-version = "py310"

[lint]
select = ["E", "F", "UP"]
ignore = [
    "E402",  # module-level import not at top (required for gi.require_version + os.environ)
    "E501",  # line too long (data definitions and i18n strings are more readable on one line)
    "E701",  # multiple statements on one line (compact cairo drawing style)
    "E702",  # multiple statements on one line with semicolon
    "E741",  # ambiguous variable name (b, l, etc. used in math)
    "UP015", # unnecessary open mode (explicit "r" is fine)
]
