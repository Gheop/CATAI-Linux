name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node.js 24 for JavaScript-based actions (Node 20 is deprecated,
  # will be removed from runners on 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests + import smoke
    # NOTE: we deliberately use the system Python3 that Ubuntu ships with,
    # because:
    #   1. PyGObject 3.50+ from pip requires girepository-2.0 dev headers
    #      that aren't on the GHA Ubuntu runner, so `pip install PyGObject`
    #      fails during meson build.
    #   2. The system Python3 already has python3-gi installed via apt,
    #      paired with the matching gir1.2-* typelibs.
    # So: skip actions/setup-python, apt-install GTK4 + python3-gi, then
    # `pip install` only the pure-Python deps (Pillow, httpx, anthropic)
    # into the system user site via --user.
    steps:
      - uses: actions/checkout@v5

      - name: Install GTK4 + Cairo + GStreamer + system PyGObject
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-pango-1.0 gir1.2-gdkpixbuf-2.0 \
            gir1.2-gstreamer-1.0 \
            libcairo2 python3-cairo

      - name: Install non-system pip deps (Pillow + httpx + anthropic)
        # --user avoids polluting /usr/lib/python3/dist-packages
        run: python3 -m pip install --user --break-system-packages Pillow httpx anthropic

      - name: Run headless unit tests
        # Add the repo root to PYTHONPATH so `import catai_linux` works
        # without needing pip install -e .
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 tests/test_modules.py

  build-check:
    runs-on: ubuntu-latest
    name: Build wheel + sanity checks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build the wheel + sdist
        run: python3 -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Inspect the wheel
        # Sanity checks that would catch the 3 biggest historical
        # packaging regressions:
        #   - cute_orange_cat/ legacy sprites slipping back in (v0.4.x bug)
        #   - wheel size ballooning (typical when assets are added without
        #     updating .gitignore / package-data rules)
        #   - package-data rules not including the catset sprites (would
        #     ship a wheel that can't start because the sprite dirs are
        #     empty)
        run: |
          python3 -c '
          import glob, sys, zipfile
          wheels = glob.glob("dist/*.whl")
          assert len(wheels) == 1, f"expected 1 wheel, got {wheels}"
          wheel = wheels[0]
          print(f"wheel: {wheel}")

          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
              total_size = sum(i.file_size for i in z.infolist())
              compressed = sum(i.compress_size for i in z.infolist())

          print(f"  files: {len(names)}")
          print(f"  compressed: {compressed // 1024} KB")
          print(f"  uncompressed: {total_size // 1024} KB")

          # 1. No legacy cute_orange_cat leftovers
          cute = [n for n in names if "cute_orange_cat" in n]
          assert not cute, f"cute_orange_cat leaked back in: {len(cute)} files"
          print("  \u2713 no cute_orange_cat leftovers")

          # 2. All 6 adult catset characters present
          for char in ["cat_orange", "cat01", "cat02", "cat03", "cat04", "cat05"]:
              meta = f"catai_linux/{char}/metadata.json"
              assert meta in names, f"missing {meta}"
              sprites = [n for n in names if n.startswith(f"catai_linux/{char}/") and n.endswith(".png")]
              assert len(sprites) > 50, f"{char}: only {len(sprites)} PNGs (expected 50+)"
          print("  \u2713 all 6 adult catset chars present with sprites")

          # 3. All 6 kitten characters present
          for kit in ["kitten_orange", "kitten01", "kitten02", "kitten03", "kitten04", "kitten05"]:
              meta = f"catai_linux/{kit}/metadata.json"
              assert meta in names, f"missing {meta}"
          print("  \u2713 all 6 kitten chars present")

          # 4. Nyan cat assets (easter egg)
          assert "catai_linux/nyan_cat.png" in names, "nyan_cat.png missing"
          assert "catai_linux/nyan_rainbow.png" in names, "nyan_rainbow.png missing"
          print("  \u2713 nyan cat assets present")

          # 5. All the extracted Python modules
          for mod in ["app", "chat_backend", "voice", "drawing", "x11_helpers", "l10n"]:
              path = f"catai_linux/{mod}.py"
              assert path in names, f"missing {path}"
          print("  \u2713 all 6 python modules present")

          # 6. Wheel size sanity: fail if > 3 MB (current ~1.6 MB, leaves
          #    margin for growth, catches runaway asset inclusion)
          size_mb = compressed / 1024 / 1024
          assert size_mb < 3.0, f"wheel too big: {size_mb:.2f} MB (cap 3.0 MB)"
          print(f"  \u2713 wheel size {size_mb:.2f} MB < 3.0 MB cap")
          '

  e2e-tests:
    runs-on: ubuntu-latest
    name: Full E2E via Xvfb + metacity
    timeout-minutes: 5
    env:
      # Redirect HOME to a tempdir so the CI never touches a contributor's
      # real ~/.config/catai. App reads CONFIG_DIR = ~/.config/catai via
      # os.path.expanduser, which follows $HOME.
      HOME: /tmp/catai_ci_home
      DISPLAY: ":99"
      # Activates MockChat in chat_backend.create_chat() — no real AI
      # backend needed for T6 'Got AI response'.
      CATAI_MOCK_CHAT: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install GTK4 + Cairo + X11 test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-pango-1.0 gir1.2-gdkpixbuf-2.0 \
            gir1.2-gstreamer-1.0 \
            libcairo2 python3-cairo \
            xvfb metacity xdotool x11-utils imagemagick \
            fonts-liberation

      - name: Install pure-Python deps via --user
        run: |
          python3 -m pip install --user --break-system-packages \
            Pillow httpx anthropic

      - name: Seed CI home + fixture config
        run: |
          mkdir -p "$HOME/.config/catai"
          cp tests/fixtures/ci_config.json "$HOME/.config/catai/config.json"
          ls -la "$HOME/.config/catai/"
          echo "--- config.json ---"
          cat "$HOME/.config/catai/config.json"

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          # Sanity: the X server should respond
          xdpyinfo -display :99 >/dev/null || (echo "Xvfb failed to start"; exit 1)
          echo "Xvfb ready on :99"

      - name: Start metacity window manager
        run: |
          # --sm-disable avoids the (missing) session manager on a CI runner;
          # --replace is idempotent in case a previous retry left a WM behind.
          # Background & detach; metacity forks into a daemon on its own.
          metacity --display=:99 --sm-disable --replace &
          sleep 1
          echo "metacity attached to :99"

      - name: Run full E2E suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 tests/e2e_test.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-screenshots
          path: /tmp/catai_e2e/
          retention-days: 7
          if-no-files-found: ignore
