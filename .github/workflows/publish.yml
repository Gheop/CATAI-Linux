name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JavaScript-based actions (Node 20 is deprecated,
  # will be removed from runners on 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.release.prerelease
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

      - name: Happy cat
        if: success()
        run: |
          echo ""
          echo "  /\_/\  ("
          echo " ( ^.^ ) _)"
          echo '   \"/  ('
          echo " ( | | )"
          echo "(__d b__)  Published to PyPI!"
          echo ""
