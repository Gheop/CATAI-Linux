name: Lint

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node.js 24 for JavaScript-based actions (Node 20 is deprecated,
  # will be removed from runners on 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pip install ruff && ruff check catai_linux/

      - name: Happy cat
        if: success()
        run: |
          echo ""
          echo "  /\_/\  ("
          echo " ( ^.^ ) _)"
          echo '   \"/  ('
          echo " ( | | )"
          echo "(__d b__)  Lint passed!"
          echo ""
